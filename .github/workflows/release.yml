name: Release

on:
  release:
    types: [created]

# Build and upload Tauri app for macOS, Windows, and Linux when a release is created

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon M1+)
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          # Linux x64
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          # Windows x64
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libclang-dev \
            clang \
            llvm
          # llvm-config may be versioned (e.g. llvm-config-14) on Ubuntu 22.04
          LLVM_CONFIG=$(which llvm-config 2>/dev/null || which llvm-config-14 2>/dev/null || echo "")
          if [ -n "$LLVM_CONFIG" ]; then
            echo "LIBCLANG_PATH=$($LLVM_CONFIG --libdir)" >> $GITHUB_ENV
          else
            echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV
          fi

      # macOS: Install LLVM/Clang for whisper-rs bindgen
      - name: Install LLVM (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install llvm
          LLVM_PREFIX=$(brew --prefix llvm)
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> $GITHUB_ENV
          echo "SDKROOT=${SDK_PATH}" >> $GITHUB_ENV
          # Tell bindgen to use the correct SDK and target architecture
          echo "BINDGEN_EXTRA_CLANG_ARGS=-isysroot ${SDK_PATH} --target=${{ matrix.rust_target }}" >> $GITHUB_ENV
          # Set MACOSX_DEPLOYMENT_TARGET to ensure consistent builds
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      # Windows: Install LLVM/Clang for whisper-rs bindgen
      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      # Clean whisper-rs-sys to force fresh bindgen on macOS
      - name: Clean whisper-rs build artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd src-tauri
          cargo clean -p whisper-rs-sys 2>/dev/null || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
          SDKROOT: ${{ env.SDKROOT }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ env.BINDGEN_EXTRA_CLANG_ARGS }}
          MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOSX_DEPLOYMENT_TARGET }}
          # Skip bindgen for whisper-rs-sys and use pre-built bindings
          # This avoids struct size mismatches on GitHub ARM runners
          WHISPER_DONT_GENERATE_BINDINGS: "1"
        with:
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
